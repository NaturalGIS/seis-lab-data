{% from "macro-jsoneditor-field.html" import jsoneditor_field %}
<form>
    {{ form.request_id() }}
    {{ jsoneditor_field(form.name) }}

    <div class="row mb-3">
        <div class="col-sm-10 offset-sm-2">
            <a
                    href="{{ url_for('dataset_categories:list') }}"
                    class="btn btn-outline-secondary"
                    aria-label="cancel-update"
            >{{ _('cancel') | capitalize }}
            </a>
            <button
                    type="submit"
                    aria-label="submit-update-form"
                    class="btn btn-primary"
                    data-on:click="@put('{{ url_for('dataset_categories:detail', dataset_category_id=item.id) }}', {
                            contentType: 'form',
                            headers: {'X-CSRFToken': '{{ form.csrf_token.current_token }}'}
                        })"
                    data-indicator="updating"
                    data-attr:disabled="$updating"
                    data-text="$updating ? '{{ _('updating dataset category...') | capitalize }}' : '{{ _('update dataset category') | capitalize }}'"
            >
            </button>
            <div class="spinner-border spinner-border-sm ms-3" role="status" aria-hidden="true"
                 data-attr:hidden="!$updating">
                <span class="visually-hidden">{{ _("loading...") | capitalize }}</span>
            </div>
        </div>
    </div>
</form>
